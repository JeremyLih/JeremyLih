<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jeremy Li frontier liquid glass profile banner</title>
  <desc id="desc">Cyberpunk liquid glass interface banner for Jeremy Li, focused on AI, quant systems, math, physics, and infrastructure.</desc>
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(196 80) rotate(38) scale(760 420)">
      <stop stop-color="#00E5FF" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#7C3AED" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
      <animate attributeName="gradientTransform" values="translate(196 80) rotate(38) scale(760 420);translate(226 92) rotate(38) scale(760 420);translate(196 80) rotate(38) scale(760 420)" dur="9s" repeatCount="indefinite"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 78) rotate(137) scale(560 360)">
      <stop stop-color="#FF4FD8" stop-opacity="0.62"/>
      <stop offset="0.5" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
      <animate attributeName="gradientTransform" values="translate(1000 78) rotate(137) scale(560 360);translate(970 98) rotate(137) scale(560 360);translate(1000 78) rotate(137) scale(560 360)" dur="8s" repeatCount="indefinite"/>
    </radialGradient>
    <linearGradient id="glass" x1="206" y1="42" x2="1024" y2="376" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF" stop-opacity="0.24"/>
      <stop offset="0.35" stop-color="#67E8F9" stop-opacity="0.08"/>
      <stop offset="0.66" stop-color="#A78BFA" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#F0ABFC" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="edge" x1="137" y1="33" x2="1079" y2="386" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE" stop-opacity="0.82"/>
      <stop offset="0.28" stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="0.68" stop-color="#8B5CF6" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#FF4FD8" stop-opacity="0.68"/>
    </linearGradient>
    <linearGradient id="text" x1="270" y1="124" x2="902" y2="231" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FDFF"/>
      <stop offset="0.48" stop-color="#A5F3FC"/>
      <stop offset="1" stop-color="#F0ABFC"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00E5FF" flood-opacity="0.65"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#8B5CF6" flood-opacity="0.32"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-40%" width="140%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00E5FF" flood-opacity="0.44"/>
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#A855F7" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" stroke="#67E8F9" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <pattern id="micro" width="11" height="11" patternUnits="userSpaceOnUse">
      <path d="M11 0H0V11" stroke="#E0F2FE" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="34" fill="#020617"/>
  <rect width="1200" height="420" rx="34" fill="url(#g1)"/>
  <rect width="1200" height="420" rx="34" fill="url(#g2)"/>
  <rect width="1200" height="420" rx="34" fill="url(#grid)"/>
  <rect x="40" y="30" width="1120" height="360" rx="30" fill="url(#micro)" opacity="0.92"/>
  <rect x="-260" y="0" width="160" height="420" fill="#E0F2FE" opacity="0.08">
    <animate attributeName="x" from="-260" to="1280" dur="5.5s" repeatCount="indefinite"/>
  </rect>

  <g filter="url(#blur)" opacity="0.9">
    <path d="M-28 362C142 252 247 279 383 326C520 373 636 408 797 314C959 220 1080 234 1226 309V452H-28V362Z" fill="#00E5FF" opacity="0.16">
      <animate attributeName="opacity" values="0.11;0.2;0.11" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M774 -22C854 32 948 39 1064 22C1135 12 1191 36 1228 68V-22H774Z" fill="#FF4FD8" opacity="0.32">
      <animate attributeName="opacity" values="0.2;0.36;0.2" dur="5.2s" repeatCount="indefinite"/>
    </path>
    <ellipse cx="225" cy="85" rx="184" ry="84" fill="#00E5FF" opacity="0.26">
      <animateTransform attributeName="transform" type="translate" values="0 0;28 -6;0 0" dur="7s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="956" cy="278" rx="220" ry="96" fill="#8B5CF6" opacity="0.24">
      <animateTransform attributeName="transform" type="translate" values="0 0;-32 8;0 0" dur="8s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g opacity="0.72">
    <path d="M49 323H285L338 279H526L568 244H790L842 202H1152" stroke="#00E5FF" stroke-opacity="0.36" stroke-width="2" stroke-dasharray="110 34">
      <animate attributeName="stroke-dashoffset" from="0" to="-144" dur="4.6s" repeatCount="indefinite"/>
    </path>
    <path d="M83 86H286L325 122H477L516 157H712L750 194H1077" stroke="#FF4FD8" stroke-opacity="0.28" stroke-width="2" stroke-dasharray="96 42">
      <animate attributeName="stroke-dashoffset" from="0" to="138" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M127 361H413M458 361H515M1011 58H1136M905 58H970" stroke="#E0F2FE" stroke-opacity="0.18" stroke-width="2"/>
  </g>

  <rect x="88" y="58" width="1024" height="304" rx="28" fill="url(#glass)" stroke="url(#edge)" stroke-width="1.4"/>
  <rect x="104" y="74" width="992" height="272" rx="22" stroke="#E0F2FE" stroke-opacity="0.14"/>
  <path d="M134 108H300M134 132H226M939 302H1060M969 324H1060" stroke="#E0F2FE" stroke-opacity="0.24" stroke-width="2" stroke-linecap="round"/>

  <g filter="url(#softGlow)">
    <circle cx="148" cy="98" r="5" fill="#00E5FF">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="169" cy="98" r="5" fill="#FF4FD8">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="1.8s" begin="0.25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="98" r="5" fill="#FDE68A">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <path d="M994 98H1062" stroke="#00E5FF" stroke-width="2.3" stroke-linecap="round"/>
    <path d="M1028 72V124" stroke="#FF4FD8" stroke-width="2.3" stroke-linecap="round"/>
  </g>

  <g opacity="0.9" filter="url(#softGlow)">
    <path d="M164 264H284L324 250H409L456 246H576" stroke="#00E5FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M630 246H769L813 250H909L954 267H1038" stroke="#FF4FD8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="284" cy="264" r="4" fill="#00E5FF"/>
    <circle cx="409" cy="250" r="4" fill="#00E5FF"/>
    <circle cx="769" cy="246" r="4" fill="#FF4FD8"/>
    <circle cx="909" cy="250" r="4" fill="#FF4FD8"/>
  </g>

  <g filter="url(#textGlow)">
    <text x="600" y="188" text-anchor="middle" fill="url(#text)" font-family="Fira Code, JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="76" font-weight="800" letter-spacing="3">JEREMY LI</text>
    <text x="600" y="236" text-anchor="middle" fill="#D8F3FF" font-family="Fira Code, JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="600" letter-spacing="2.4">AI / ML · QUANT SYSTEMS · MATH + PHYSICS · EDGE INFRA</text>
  </g>

  <g font-family="Fira Code, JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="15">
    <rect x="177" y="286" width="196" height="34" rx="17" fill="#020617" fill-opacity="0.62" stroke="#00E5FF" stroke-opacity="0.52"/>
    <text x="275" y="308" text-anchor="middle" fill="#A5F3FC">LEARNING LOOP</text>
    <rect x="400" y="286" width="178" height="34" rx="17" fill="#020617" fill-opacity="0.62" stroke="#8B5CF6" stroke-opacity="0.62"/>
    <text x="489" y="308" text-anchor="middle" fill="#DDD6FE">SMALL TESTS</text>
    <rect x="605" y="286" width="197" height="34" rx="17" fill="#020617" fill-opacity="0.62" stroke="#FF4FD8" stroke-opacity="0.52"/>
    <text x="704" y="308" text-anchor="middle" fill="#FBCFE8">SYSTEM NOTES</text>
    <rect x="829" y="286" width="196" height="34" rx="17" fill="#020617" fill-opacity="0.62" stroke="#FDE68A" stroke-opacity="0.44"/>
    <text x="927" y="308" text-anchor="middle" fill="#FEF3C7">REVISE / ITERATE</text>
  </g>

  <g opacity="0.52">
    <path d="M88 164L104 148V101C104 86 116 74 131 74H184" stroke="#E0F2FE" stroke-opacity="0.28"/>
    <path d="M1112 255L1096 271V319C1096 334 1084 346 1069 346H1014" stroke="#E0F2FE" stroke-opacity="0.28"/>
    <path d="M82 58L53 87V148" stroke="#00E5FF" stroke-opacity="0.38"/>
    <path d="M1118 362L1147 333V274" stroke="#FF4FD8" stroke-opacity="0.38"/>
  </g>
