<svg width="1200" height="150" viewBox="0 0 1200 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated signal flow</title>
  <desc id="desc">An animated cyberpunk signal pipeline from question to model, test, failure, and revision.</desc>
  <defs>
    <linearGradient id="rail" x1="90" y1="76" x2="1110" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#FF4FD8"/>
    </linearGradient>
    <linearGradient id="panel" x1="160" y1="20" x2="1040" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#67E8F9" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#F0ABFC" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-80%" width="160%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00E5FF" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#8B5CF6" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#E0F2FE" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="150" rx="24" fill="#020617"/>
  <rect width="1200" height="150" rx="24" fill="url(#grid)"/>
  <rect x="60" y="26" width="1080" height="98" rx="24" fill="url(#panel)" stroke="#E0F2FE" stroke-opacity="0.18"/>

  <path d="M130 76H1070" stroke="#0F172A" stroke-width="16" stroke-linecap="round"/>
  <path d="M130 76H1070" stroke="url(#rail)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" stroke-dasharray="120 46">
    <animate attributeName="stroke-dashoffset" from="0" to="-166" dur="2.6s" repeatCount="indefinite"/>
  </path>

  <g font-family="Fira Code, JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700" text-anchor="middle">
    <g>
      <circle cx="160" cy="76" r="13" fill="#020617" stroke="#00E5FF" stroke-width="2"/>
      <text x="160" y="116" fill="#A5F3FC">question</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="2.8s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="380" cy="76" r="13" fill="#020617" stroke="#22D3EE" stroke-width="2"/>
      <text x="380" y="116" fill="#BAE6FD">model</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="600" cy="76" r="13" fill="#020617" stroke="#8B5CF6" stroke-width="2"/>
      <text x="600" y="116" fill="#DDD6FE">test</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="820" cy="76" r="13" fill="#020617" stroke="#FF4FD8" stroke-width="2"/>
      <text x="820" y="116" fill="#FBCFE8">failure</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="2.8s" begin="0.9s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="1040" cy="76" r="13" fill="#020617" stroke="#FDE68A" stroke-width="2"/>
      <text x="1040" y="116" fill="#FEF3C7">revision</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
    </g>
  </g>

  <circle r="5" fill="#FFFFFF" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M130 76H1070"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.9;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>
</svg>
